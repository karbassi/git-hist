name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: git-hist-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: git-hist-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: git-hist-linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ github.workspace }}/${{ matrix.artifact }}.tar.gz git-hist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            git-hist-macos-arm64/git-hist-macos-arm64.tar.gz
            git-hist-macos-x86_64/git-hist-macos-x86_64.tar.gz
            git-hist-linux-x86_64/git-hist-linux-x86_64.tar.gz
          generate_release_notes: true
